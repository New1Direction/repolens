<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RepoLens — Library</title>
<style>
  :root {
    --bg: #070b11; --panel: #0e1722; --panel-2: #0b1622; --border: #1c2b3e; --border-2: #244660;
    --text: #e6edf5; --sub: #9fb2c9; --muted: #647488; --cyan: #38bdf8; --mono: ui-monospace, Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    /* Semantic fit tokens — one source of truth for the verdict palette. */
    --fit-strong: #4ade80; --fit-solid: #38bdf8; --fit-care: #fbbf24; --fit-risky: #f87171; --danger: #f87171;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: radial-gradient(1200px 700px at 70% -10%, #0d1b2e 0%, var(--bg) 55%);
    color: var(--text); font-family: var(--sans); min-height: 100vh; }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 24px 80px; }

  .lib-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 4px; }
  .lib-header h1 { font-size: 22px; margin: 0; letter-spacing: -0.02em; }
  .lib-header .count { font: 600 12px/1 var(--mono); color: var(--muted); }
  .lib-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .lib-btn, .lib-settings { background: var(--panel); border: 1px solid var(--border); color: var(--sub);
    border-radius: 8px; padding: 6px 11px; cursor: pointer; font: 600 12px var(--sans); transition: all .14s; }
  .lib-btn:hover, .lib-settings:hover { border-color: var(--border-2); color: var(--text); }
  .lib-btn-danger:hover { border-color: var(--danger); color: var(--danger); }
  .lib-btn.armed { border-color: var(--danger); color: var(--danger); }
  .lib-tagline { color: var(--sub); font-size: 13px; margin: 0 0 22px; }
  .lib-note { color: var(--muted); font-size: 12px; margin: -16px 0 18px; }

  .lib-controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
  .lib-search { flex: 1 1 240px; min-width: 200px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 9px; padding: 10px 13px; color: var(--text); font: 400 13px var(--sans); }
  .lib-search:focus { outline: none; border-color: var(--border-2); }
  .lib-search::placeholder { color: var(--muted); }
  .lib-sort { background: var(--panel); border: 1px solid var(--border); border-radius: 9px; padding: 10px 12px;
    color: var(--sub); font: 600 12px var(--sans); cursor: pointer; }
  .lib-caps { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 22px; }
  .lib-cap { font: 600 11px/1 var(--mono); color: var(--sub); background: var(--panel); border: 1px solid var(--border);
    padding: 6px 10px; border-radius: 999px; cursor: pointer; transition: all .14s; }
  .lib-cap:hover { border-color: var(--border-2); color: var(--text); }
  .lib-cap.on { background: #0c2030; border-color: var(--cyan); color: var(--cyan); }

  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 14px; }
  .lib-card { background: var(--panel); border: 1px solid var(--border); border-radius: 13px; padding: 15px 16px;
    cursor: pointer; transition: transform .14s, border-color .14s, box-shadow .14s; display: flex; flex-direction: column; gap: 9px; }
  .lib-card:hover { transform: translateY(-2px); border-color: var(--border-2); box-shadow: 0 14px 30px -18px #000; }
  .lc-top { display: flex; align-items: center; gap: 9px; }
  .lc-name { font-size: 15px; font-weight: 600; letter-spacing: -.01em; }
  .lc-owner { font: 500 11.5px/1 var(--mono); color: var(--muted); }
  .lc-chip { margin-left: auto; font: 800 11px/1 var(--sans); padding: 5px 9px; border-radius: 7px; white-space: nowrap; }
  .fit-strong { background: var(--fit-strong); color: #06210f; } .fit-solid { background: var(--fit-solid); color: #052235; }
  .fit-care { background: var(--fit-care); color: #241a02; } .fit-risky { background: var(--fit-risky); color: #250a08; }
  .fit-unrated { background: #2a3441; color: #9fb2c9; }
  .lc-blurb { font-size: 12.5px; color: var(--sub); line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .lc-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; font-size: 11.5px; color: var(--muted); }
  .lc-health { font-family: var(--mono); }
  .lc-cat { color: var(--sub); }
  .lc-when { margin-left: auto; font: 500 10.5px/1 var(--mono); color: var(--muted); white-space: nowrap; }
  .lc-langs { display: flex; gap: 4px; }
  .lc-dot { width: 9px; height: 9px; border-radius: 50%; }
  .lc-tags { display: flex; gap: 5px; flex-wrap: wrap; }
  .lc-tag { font: 600 9.5px/1 var(--mono); letter-spacing: .04em; color: var(--sub); background: var(--panel-2);
    border: 1px solid var(--border); padding: 3px 6px; border-radius: 5px; }

  /* Per-card management actions — invisible until the card is hovered/focused. */
  .lc-actions { display: flex; gap: 6px; opacity: 0; transition: opacity .14s; }
  .lib-card:hover .lc-actions, .lib-card:focus-within .lc-actions { opacity: 1; }
  .lc-act { font: 600 10.5px/1 var(--mono); color: var(--sub); background: var(--panel-2);
    border: 1px solid var(--border); padding: 5px 8px; border-radius: 6px; cursor: pointer; transition: all .12s; }
  .lc-act:hover { border-color: var(--border-2); color: var(--text); }
  .lc-act-del { margin-left: auto; }
  .lc-act-del:hover { border-color: #f87171; color: #f87171; }

  .lib-empty { text-align: center; padding: 80px 20px; color: var(--sub); }
  .lib-empty h2 { font-size: 17px; color: var(--text); margin: 0 0 8px; }
  .lib-empty code { font: 600 12px var(--mono); background: var(--panel); border: 1px solid var(--border); padding: 2px 7px; border-radius: 5px; color: var(--cyan); }

  /* Stats bar — a one-glance read on the shape of the library. */
  .lib-stats { display: flex; flex-wrap: wrap; gap: 8px 14px; align-items: center; margin: 0 0 18px;
    padding: 11px 14px; background: var(--panel); border: 1px solid var(--border); border-radius: 11px; }
  .ls-total { font: 800 14px var(--sans); color: var(--text); }
  .ls-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .ls-pill { font: 700 11px/1 var(--mono); padding: 4px 8px; border-radius: 999px; }
  .ls-pill.strong { background: var(--fit-strong); color: #06210f; }
  .ls-pill.solid  { background: var(--fit-solid);  color: #052235; }
  .ls-pill.care   { background: var(--fit-care);   color: #241a02; }
  .ls-pill.risky  { background: var(--fit-risky);  color: #250a08; }
  .ls-pill.unrated{ background: #2a3441; color: var(--sub); }
  .ls-health { margin-left: auto; font: 600 12px var(--mono); color: var(--sub); }

  /* Backup / import status + confirm panel. */
  .lib-status { font: 500 12.5px var(--sans); color: var(--cyan); margin: -8px 0 16px; }
  .lib-status.err { color: var(--danger); }
  .lib-import-confirm { background: var(--panel); border: 1px solid var(--border-2); border-radius: 11px;
    padding: 16px; margin: 0 0 18px; }
  .lic-msg { color: var(--text); font-size: 13.5px; line-height: 1.5; margin: 0 0 12px; }
  .lic-msg b { color: var(--cyan); }
  .lic-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* Accessibility: a visible keyboard focus ring everywhere, and honour
     reduced-motion by dropping transitions/transforms. */
  :focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; border-radius: 4px; }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
    .lib-card:hover { transform: none; }
  }

  .hidden { display: none; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="lib-header">
      <h1>Library</h1><span class="count" id="count"></span>
      <div class="lib-actions">
        <button class="lib-btn" id="export" title="Download your whole library as a JSON backup" aria-label="Export library as a backup file">⬇ Export</button>
        <button class="lib-btn" id="import" title="Restore a library from a backup file" aria-label="Import a library backup file">⬆ Import</button>
        <button class="lib-btn lib-btn-danger" id="clear" title="Remove every repo from this library" aria-label="Clear the whole library">🗑 Clear</button>
        <button class="lib-settings" id="settings" title="RepoLens settings" aria-label="Open RepoLens settings">⚙ Settings</button>
      </div>
    </div>
    <p class="lib-tagline">Every repo you've analyzed, at a glance — click a card to reopen its analysis, hover it to re-scan, open the source, or remove it.</p>
    <p class="lib-note hidden" id="note"></p>
    <div class="lib-stats hidden" id="stats"></div>
    <p class="lib-status hidden" id="status" role="status" aria-live="polite"></p>
    <div class="lib-import-confirm hidden" id="import-confirm"></div>
    <input type="file" id="file-input" accept="application/json,.json" hidden>

    <div class="lib-controls">
      <input class="lib-search" id="search" type="text" placeholder="Search repos…" autocomplete="off">
      <select class="lib-sort" id="sort">
        <option value="fit">Sort: Best fit</option>
        <option value="health">Sort: Health</option>
        <option value="recent">Sort: Recently scanned</option>
        <option value="stars">Sort: Stars</option>
        <option value="name">Sort: Name</option>
      </select>
    </div>
    <div class="lib-caps" id="caps"></div>

    <div id="grid"></div>
    <div class="lib-empty hidden" id="empty"></div>
  </div>
  <script src="library.js" type="module"></script>
</body>
</html>
