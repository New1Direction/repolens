<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RepoLens — Library</title>
<link rel="stylesheet" href="themes.css">
<link rel="stylesheet" href="mascot.css">
<style>
  /* The Library maps its local colour vocabulary onto the active theme's tokens
     (themes.css), so it honours the chosen theme like every other surface.
     --bg / --border / --border-2 / --text / --mono come straight from the theme;
     only the Library-specific aliases are defined here. */
  :root {
    --panel: var(--surface); --panel-2: var(--surface-alt);
    --sub: var(--text-sub); --muted: var(--text-muted);
    --cyan: var(--accent); --sans: var(--font);
    /* Semantic fit palette derives from the shared status hues. */
    --fit-strong: var(--ok); --fit-solid: var(--info); --fit-care: var(--warn); --fit-risky: var(--bad); --danger: var(--bad);
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: radial-gradient(1200px 700px at 70% -10%, var(--surface) 0%, var(--bg) 55%);
    color: var(--text); font-family: var(--sans); min-height: 100vh; }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 24px 80px; }

  .lib-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 4px; }
  .lib-header h1 { font-size: 22px; margin: 0; letter-spacing: -0.02em; }
  .lib-header .count { font: 600 12px/1 var(--mono); color: var(--muted); }
  .lib-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .lib-btn, .lib-settings { background: var(--panel); border: 1px solid var(--border); color: var(--sub);
    border-radius: 8px; padding: 6px 11px; cursor: pointer; font: 600 12px var(--sans);
    transition: color var(--dur-fast) var(--ease-out), border-color var(--dur-fast) var(--ease-out), background-color var(--dur-fast) var(--ease-out), transform var(--dur-fast) var(--ease-out); }
  .lib-btn:hover, .lib-settings:hover { border-color: var(--border-2); color: var(--text); }
  .lib-btn-danger:hover { border-color: var(--danger); color: var(--danger); }
  .lib-btn.armed { border-color: var(--danger); color: var(--danger); }
  .lib-tagline { color: var(--sub); font-size: 13px; margin: 0 0 22px; }
  .lib-note { color: var(--muted); font-size: 12px; margin: -16px 0 18px; }

  .lib-controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
  .lib-search { flex: 1 1 240px; min-width: 200px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 9px; padding: 10px 13px; color: var(--text); font: 400 13px var(--sans); }
  .lib-search:focus { outline: none; border-color: var(--border-2); }
  .lib-search::placeholder { color: var(--muted); }
  .lib-sort { background: var(--panel); border: 1px solid var(--border); border-radius: 9px; padding: 10px 12px;
    color: var(--sub); font: 600 12px var(--sans); cursor: pointer; }
  .lib-caps { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 22px; }
  .lib-cap { font: 600 11px/1 var(--mono); color: var(--sub); background: var(--panel); border: 1px solid var(--border);
    padding: 6px 10px; border-radius: 999px; cursor: pointer;
    transition: color var(--dur-fast) var(--ease-out), border-color var(--dur-fast) var(--ease-out), background-color var(--dur-fast) var(--ease-out), transform var(--dur-fast) var(--ease-out); }
  .lib-cap:hover { border-color: var(--border-2); color: var(--text); }
  .lib-cap.on { background: color-mix(in srgb, var(--accent) 16%, var(--surface)); border-color: var(--cyan); color: var(--cyan); }

  /* Collections ("Boards") filter bar */
  .lib-colls { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: 18px; }
  .lib-colls:empty { display: none; }
  .lib-coll { display: inline-flex; align-items: center; gap: 6px; font: 600 12px var(--sans); color: var(--sub);
    background: var(--panel); border: 1px solid var(--border); padding: 6px 11px; border-radius: 999px; cursor: pointer;
    transition: color var(--dur-fast) var(--ease-out), border-color var(--dur-fast) var(--ease-out), background-color var(--dur-fast) var(--ease-out), transform var(--dur-fast) var(--ease-out); }
  .lib-coll:hover { border-color: var(--border-2); color: var(--text); }
  .lib-coll:active { transform: scale(0.97); }
  .lib-coll.on { background: color-mix(in srgb, var(--accent) 16%, var(--surface)); border-color: var(--cyan); color: var(--text); }
  .lib-coll .coll-n { font: 700 10px/1 var(--mono); color: var(--muted); background: var(--panel-2); border-radius: 999px; padding: 2px 6px; }
  .lib-coll.on .coll-n { color: var(--cyan); }
  .coll-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .lib-coll-new { color: var(--cyan); border-style: dashed; }
  .lib-coll-del { margin-left: 4px; color: var(--danger); border-color: color-mix(in srgb, var(--danger) 40%, var(--border)); }

  /* Per-card board membership dots */
  .lc-boards { display: inline-flex; gap: 3px; align-items: center; margin-left: auto; }
  .lc-board-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* Boards assignment popover */
  .boards-pop { position: absolute; z-index: 60; min-width: 200px; max-width: 280px; background: var(--panel);
    border: 1px solid var(--border-2); border-radius: 10px; padding: 5px; box-shadow: 0 14px 40px -12px rgba(0,0,0,.55); }
  .bp-row { display: flex; align-items: center; gap: 8px; width: 100%; text-align: left; font: 600 12px var(--sans);
    color: var(--text); background: none; border: none; border-radius: 7px; padding: 8px 9px; cursor: pointer; }
  .bp-row:hover { background: var(--panel-2); }
  .bp-row:active { transform: scale(0.985); }
  .bp-check { width: 14px; flex-shrink: 0; color: var(--cyan); font-weight: 800; }
  .bp-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bp-empty { padding: 8px 9px; font-size: 12px; color: var(--muted); }
  .bp-new { color: var(--cyan); border-top: 1px solid var(--border); border-radius: 0 0 7px 7px; margin-top: 2px; }

  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 14px; }
  .lib-card { background: var(--panel); border: 1px solid var(--border); border-radius: 13px; padding: 15px 16px;
    cursor: pointer; transition: transform var(--dur) var(--ease-out), border-color var(--dur) var(--ease-out), box-shadow var(--dur) var(--ease-out); display: flex; flex-direction: column; gap: 9px; }
  .lib-card:hover { transform: translateY(-2px); border-color: var(--border-2); box-shadow: 0 14px 30px -18px rgba(0,0,0,.4); }
  .lc-top { display: flex; align-items: center; gap: 9px; }
  .lc-name { font-size: 15px; font-weight: 600; letter-spacing: -.01em; }
  .lc-owner { font: 500 11.5px/1 var(--mono); color: var(--muted); }
  .lc-chip { margin-left: auto; font: 800 11px/1 var(--sans); padding: 5px 9px; border-radius: 7px; white-space: nowrap; }
  .fit-strong { background: var(--fit-strong); color: #06210f; } .fit-solid { background: var(--fit-solid); color: #052235; }
  .fit-care { background: var(--fit-care); color: #241a02; } .fit-risky { background: var(--fit-risky); color: #250a08; }
  .fit-unrated { background: color-mix(in srgb, var(--text-muted) 18%, var(--surface)); color: var(--text-sub); }
  .lc-blurb { font-size: 12.5px; color: var(--sub); line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .lc-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; font-size: 11.5px; color: var(--muted); }
  .lc-health { font-family: var(--mono); }
  .lc-cat { color: var(--sub); }
  .lc-when { margin-left: auto; font: 500 10.5px/1 var(--mono); color: var(--muted); white-space: nowrap; }
  .lc-langs { display: flex; gap: 4px; }
  .lc-dot { width: 9px; height: 9px; border-radius: 50%; }
  .lc-tags { display: flex; gap: 5px; flex-wrap: wrap; }
  .lc-tag { font: 600 9.5px/1 var(--mono); letter-spacing: .04em; color: var(--sub); background: var(--panel-2);
    border: 1px solid var(--border); padding: 3px 6px; border-radius: 5px; }

  /* Per-card management actions — invisible until the card is hovered/focused. */
  .lc-actions { display: flex; gap: 6px; opacity: 0; transition: opacity .14s; }
  .lib-card:hover .lc-actions, .lib-card:focus-within .lc-actions { opacity: 1; }
  .lc-act { font: 600 10.5px/1 var(--mono); color: var(--sub); background: var(--panel-2);
    border: 1px solid var(--border); padding: 5px 8px; border-radius: 6px; cursor: pointer;
    transition: color var(--dur-fast) var(--ease-out), border-color var(--dur-fast) var(--ease-out), transform var(--dur-fast) var(--ease-out); }
  .lc-act:hover { border-color: var(--border-2); color: var(--text); }
  .lc-act-del { margin-left: auto; }
  .lc-act-del:hover { border-color: var(--bad); color: var(--bad-ink); }

  .lib-empty { text-align: center; padding: 80px 20px; color: var(--sub); }
  .lib-empty h2 { font-size: 17px; color: var(--text); margin: 0 0 8px; }
  .lib-empty code { font: 600 12px var(--mono); background: var(--panel); border: 1px solid var(--border); padding: 2px 7px; border-radius: 5px; color: var(--cyan); }

  /* Stats bar — a one-glance read on the shape of the library. */
  .lib-stats { display: flex; flex-wrap: wrap; gap: 8px 14px; align-items: center; margin: 0 0 18px;
    padding: 11px 14px; background: var(--panel); border: 1px solid var(--border); border-radius: 11px; }
  .ls-total { font: 800 14px var(--sans); color: var(--text); }
  .ls-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .ls-pill { font: 700 11px/1 var(--mono); padding: 4px 8px; border-radius: 999px; }
  .ls-pill.strong { background: var(--fit-strong); color: #06210f; }
  .ls-pill.solid  { background: var(--fit-solid);  color: #052235; }
  .ls-pill.care   { background: var(--fit-care);   color: #241a02; }
  .ls-pill.risky  { background: var(--fit-risky);  color: #250a08; }
  .ls-pill.unrated{ background: color-mix(in srgb, var(--text-muted) 18%, var(--surface)); color: var(--sub); }
  .ls-health { margin-left: auto; font: 600 12px var(--mono); color: var(--sub); }

  /* Backup / import status + confirm panel. */
  .lib-status { font: 500 12.5px var(--sans); color: var(--cyan); margin: -8px 0 16px; }
  .lib-status.err { color: var(--danger); }
  .lib-import-confirm { background: var(--panel); border: 1px solid var(--border-2); border-radius: 11px;
    padding: 16px; margin: 0 0 18px; }
  .lic-msg { color: var(--text); font-size: 13.5px; line-height: 1.5; margin: 0 0 12px; }
  .lic-msg b { color: var(--cyan); }
  .lic-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* Accessibility: a visible keyboard focus ring everywhere, and honour
     reduced-motion by dropping transitions/transforms. */
  :focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; border-radius: 4px; }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
    .lib-card:hover { transform: none; }
  }

  /* Bulk selection mode — pick several repos and remove them in one action. */
  .lib-selbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    margin: 0 0 16px; padding: 10px 14px; background: var(--panel); border: 1px solid var(--cyan); border-radius: 11px; }
  .lsb-count { font: 700 12.5px var(--sans); color: var(--text); }
  .lib-selbar #sel-done { margin-left: auto; }
  .lib-btn[disabled] { opacity: .45; cursor: not-allowed; }
  #select[aria-pressed="true"] { border-color: var(--cyan); color: var(--cyan); }

  .lc-check { display: none; appearance: none; -webkit-appearance: none; width: 17px; height: 17px;
    flex-shrink: 0; border: 1.5px solid var(--border-2); border-radius: 5px; cursor: pointer;
    position: relative; background: var(--panel-2); transition: background .12s, border-color .12s; }
  #grid.selecting .lc-check { display: inline-block; }
  .lc-check:checked { background: var(--cyan); border-color: var(--cyan); }
  .lc-check:checked::after { content: '✓'; position: absolute; inset: 0; display: grid; place-items: center;
    font-size: 11px; font-weight: 800; color: var(--bg); }
  #grid.selecting .lc-actions { display: none; }
  #grid.selecting .lib-card:hover { transform: none; box-shadow: none; }
  .lib-card.is-selected { border-color: var(--cyan); box-shadow: 0 0 0 1px var(--cyan) inset; }

  .hidden { display: none; }

  /* ── Subtle motion pass ───────────────────────────────────────────────
     Press feedback is instant for everyone; entrances/stagger are gated to
     (prefers-reduced-motion: no-preference). The reduce reset above wins. */
  .lib-btn:active, .lib-settings:active, .lib-cap:active, .lc-act:active { transform: scale(0.97); }
  .lib-card:active { transform: translateY(-1px) scale(0.995); }
  #grid.selecting .lib-card:active { transform: none; }

  @media (prefers-reduced-motion: no-preference) {
    /* Grid fills in with a short, capped stagger. `backwards` fill keeps the
       hover lift working after the entrance (avoids `both` pinning transform). */
    .lib-card { animation: lib-card-in var(--dur-slow) var(--ease-out) backwards; }
    @keyframes lib-card-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .lib-card:nth-child(1)  { animation-delay: 0ms; }
    .lib-card:nth-child(2)  { animation-delay: 30ms; }
    .lib-card:nth-child(3)  { animation-delay: 60ms; }
    .lib-card:nth-child(4)  { animation-delay: 90ms; }
    .lib-card:nth-child(5)  { animation-delay: 120ms; }
    .lib-card:nth-child(6)  { animation-delay: 150ms; }
    .lib-card:nth-child(7)  { animation-delay: 180ms; }
    .lib-card:nth-child(8)  { animation-delay: 210ms; }
    .lib-card:nth-child(9)  { animation-delay: 240ms; }
    .lib-card:nth-child(n+10) { animation-delay: 270ms; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="lib-header">
      <h1>Library</h1><span class="count" id="count"></span>
      <div class="lib-actions">
        <button class="lib-btn" id="select" title="Select several repos to remove at once" aria-pressed="false">☑ Select</button>
        <button class="lib-btn" id="export" title="Download your whole library as a JSON backup" aria-label="Export library as a backup file">⬇ Export</button>
        <button class="lib-btn" id="import" title="Restore a library from a backup file" aria-label="Import a library backup file">⬆ Import</button>
        <button class="lib-btn lib-btn-danger" id="clear" title="Remove every repo from this library" aria-label="Clear the whole library">🗑 Clear</button>
        <button class="lib-settings" id="settings" title="RepoLens settings" aria-label="Open RepoLens settings">⚙ Settings</button>
      </div>
    </div>
    <p class="lib-tagline">Every repo you've analyzed, at a glance — click a card to reopen its analysis, hover it to re-scan, open the source, or remove it.</p>
    <p class="lib-note hidden" id="note"></p>
    <div class="lib-stats hidden" id="stats"></div>
    <p class="lib-status hidden" id="status" role="status" aria-live="polite"></p>
    <div class="lib-import-confirm hidden" id="import-confirm"></div>
    <div class="lib-selbar hidden" id="selbar" role="region" aria-label="Bulk selection">
      <span class="lsb-count" id="sel-count" aria-live="polite">0 selected</span>
      <button class="lib-btn" id="sel-all">Select all</button>
      <button class="lib-btn lib-btn-danger" id="sel-del" disabled>Delete selected</button>
      <button class="lib-btn" id="sel-done" title="Leave selection mode">Done</button>
    </div>
    <input type="file" id="file-input" accept="application/json,.json" hidden>

    <div class="lib-controls">
      <input class="lib-search" id="search" type="text" placeholder="Search repos…" autocomplete="off">
      <select class="lib-sort" id="sort">
        <option value="fit">Sort: Best fit</option>
        <option value="health">Sort: Health</option>
        <option value="recent">Sort: Recently scanned</option>
        <option value="stars">Sort: Stars</option>
        <option value="name">Sort: Name</option>
      </select>
    </div>
    <div class="lib-caps" id="caps"></div>

    <!-- Collections ("Boards") filter bar — populated by library.js -->
    <div class="lib-colls" id="collections"></div>

    <div id="grid"></div>
    <div class="lib-empty hidden" id="empty"></div>
  </div>
  <script src="library.js" type="module"></script>
</body>
</html>
